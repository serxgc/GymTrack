<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GymTracker 🏋️</title>
<style>
:root{--bg:#0f0f1a;--card:#1a1a2e;--elevated:#22223b;--border:rgba(255,255,255,0.09);--primary:#6366f1;--primary-d:#4f46e5;--success:#22c55e;--danger:#ef4444;--warn:#f59e0b;--text:#e2e8f0;--muted:#94a3b8;--r:12px;--rs:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#app{max-width:640px;margin:0 auto;padding-bottom:80px;min-height:calc(100vh - 80px)}
.pg{padding:1.25rem 1rem}
/* Nav */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:.5rem 0 .8rem;z-index:100;backdrop-filter:blur(12px)}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.68rem;color:var(--muted);cursor:pointer;padding:.3rem .6rem;border:none;background:none;border-radius:var(--rs);transition:color .15s;position:relative}
.ni.active{color:var(--primary)}.ni:hover{color:var(--text)}
.ni-icon{font-size:1.3rem}
#badge{display:none;position:absolute;top:4px;right:10px;width:8px;height:8px;background:var(--success);border-radius:50%}
/* Headers */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.4rem;gap:.75rem}
.pt{font-size:1.55rem;font-weight:700;letter-spacing:-.5px}
.grt{font-size:.88rem;color:var(--muted)}
/* Stats */
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem;margin-bottom:1.4rem}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;text-align:center}
.si{font-size:1.4rem;margin-bottom:.3rem}
.sv{font-size:1.75rem;font-weight:700;color:var(--primary)}
.sl{font-size:.72rem;color:var(--muted);margin-top:.15rem}
/* Active banner */
.ab{background:linear-gradient(135deg,#1a2744,#1e3a5f);border:1px solid #3b82f6;border-radius:var(--r);padding:.9rem 1rem;display:flex;align-items:center;gap:.9rem;margin-bottom:1.2rem;cursor:pointer;transition:transform .1s}
.ab:hover{transform:scale(1.01)}.ab-ico{font-size:1.7rem}
.ab-t{font-weight:600;color:#93c5fd}.ab-s{font-size:.78rem;color:var(--muted)}
.ab-arr{margin-left:auto;font-size:1.2rem;color:#93c5fd}
/* Section */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem}
.st{font-size:1.05rem;font-weight:600}
/* Quick actions */
.qa{display:flex;flex-direction:column;gap:.7rem;margin-top:1.4rem}
.qb{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1.1rem;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:.7rem;font-size:.97rem;transition:border-color .15s,background .15s;width:100%}
.qb:hover{border-color:var(--primary);background:var(--elevated)}
.qb.p{background:var(--primary);border-color:var(--primary);font-weight:600}
.qb.p:hover{background:var(--primary-d)}.qb-ico{font-size:1.25rem}
/* Workout card */
.wc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;margin-bottom:.7rem;cursor:pointer;transition:border-color .15s,transform .1s;position:relative}
.wc:hover{border-color:var(--primary);transform:translateY(-1px)}
.wn{font-weight:600;font-size:.97rem;margin-bottom:.2rem}
.wd{font-size:.78rem;color:var(--muted);margin-bottom:.45rem}
.ws{display:flex;gap:.9rem;font-size:.78rem;color:var(--muted);flex-wrap:wrap}
/* Buttons */
.bp{background:var(--primary);color:#fff;border:none;border-radius:var(--rs);padding:.45rem 1.2rem;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .15s}
.bp:hover{background:var(--primary-d)}
.bs{background:var(--elevated);color:var(--text);border:1px solid var(--border);border-radius:var(--rs);padding:.45rem 1.2rem;font-size:.9rem;cursor:pointer}
.bl{background:none;border:none;color:var(--primary);cursor:pointer;font-size:.88rem;padding:0}.bl:hover{text-decoration:underline}
.bback{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.92rem;padding:0}.bback:hover{color:var(--text)}
.bdel{position:absolute;top:.7rem;right:.7rem;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.95rem;padding:.2rem;opacity:.5;transition:opacity .15s}.bdel:hover{opacity:1;color:var(--danger)}
.bst{background:var(--success);color:#fff;border:none;border-radius:var(--rs);padding:.35rem .9rem;font-size:.82rem;font-weight:600;cursor:pointer}
/* Workout editor */
.weh{display:flex;align-items:center;gap:.7rem;margin-bottom:.9rem;flex-wrap:wrap}
.wni{flex:1;background:var(--elevated);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:.45rem .7rem;font-size:.97rem;font-weight:600;min-width:110px}
.wni:focus{outline:none;border-color:var(--primary)}
.bfin{background:var(--success);color:#fff;border:none;border-radius:var(--rs);padding:.45rem 1.1rem;font-size:.88rem;font-weight:600;cursor:pointer;white-space:nowrap}
.tb{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:.55rem .9rem;display:flex;justify-content:space-between;font-size:.87rem;color:var(--muted);margin-bottom:.9rem}
/* Exercise block */
.eb{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;margin-bottom:.7rem}
.ebh{display:flex;align-items:center;gap:.5rem;margin-bottom:.7rem}
.ebn{font-weight:600;flex:1}.ebm{font-size:.72rem;color:var(--muted)}
.brex{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.82rem;padding:.2rem}.brex:hover{color:var(--danger)}
.seth{display:grid;grid-template-columns:26px 1fr 1fr 30px 26px;gap:.4rem;color:var(--muted);font-size:.72rem;padding:0 0 .35rem;text-align:center}
.sr{display:grid;grid-template-columns:26px 1fr 1fr 30px 26px;gap:.4rem;align-items:center;padding:.25rem 0;border-radius:var(--rs);transition:background .15s}
.sr.done{background:rgba(34,197,94,.08)}
.sn{text-align:center;color:var(--muted);font-size:.82rem}
.si2{background:var(--elevated);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.3rem .4rem;font-size:.88rem;width:100%;text-align:center}
.si2:focus{outline:none;border-color:var(--primary)}
.brs{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;text-align:center}.brs:hover{color:var(--danger)}
.bas{background:none;border:1px dashed var(--border);border-radius:var(--rs);color:var(--muted);padding:.38rem;width:100%;cursor:pointer;font-size:.82rem;margin-top:.45rem;transition:border-color .15s,color .15s}
.bas:hover{border-color:var(--primary);color:var(--primary)}
.bae{width:100%;background:var(--card);border:2px dashed var(--border);border-radius:var(--r);color:var(--muted);padding:.9rem;cursor:pointer;font-size:.97rem;transition:border-color .15s,color .15s;margin:.45rem 0}
.bae:hover{border-color:var(--primary);color:var(--primary)}
.ni2{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:.65rem .75rem;font-size:.88rem;resize:vertical;min-height:65px;font-family:inherit}
.ni2:focus{outline:none;border-color:var(--primary)}
/* Modal */
.modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.modal.h{display:none}
.mc{background:var(--card);border-radius:var(--r) var(--r) 0 0;width:100%;max-height:75vh;display:flex;flex-direction:column;overflow:hidden;max-width:640px;margin:0 auto}
.mh{display:flex;justify-content:space-between;align-items:center;padding:.9rem;border-bottom:1px solid var(--border)}
.mh h3{font-size:1.05rem;font-weight:600}
.mh button{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:.2rem}
.ms{background:var(--elevated);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:.55rem .85rem;margin:.7rem;font-size:.92rem;width:calc(100% - 1.4rem)}
.ms:focus{outline:none;border-color:var(--primary)}
.epg{overflow-y:auto;padding:0 .7rem .9rem;flex:1}
.pg2{margin-bottom:.45rem}
.pgl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:.35rem .2rem;border-bottom:1px solid var(--border);margin-bottom:.2rem}
.pe{padding:.6rem .45rem;cursor:pointer;border-radius:var(--rs);font-size:.92rem;transition:background .12s;display:flex;justify-content:space-between;align-items:center}
.pe:hover{background:var(--elevated)}.peq{font-size:.72rem;color:var(--muted)}
.pem{padding:1.4rem;text-align:center;color:var(--muted)}
/* Exercise library */
.si3{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:.6rem .85rem;font-size:.92rem;margin-bottom:.9rem}
.si3:focus{outline:none;border-color:var(--primary)}
.mts{display:flex;gap:.45rem;overflow-x:auto;padding-bottom:.2rem;margin-bottom:.9rem;scrollbar-width:none}
.mts::-webkit-scrollbar{display:none}
.mt{background:var(--card);border:1px solid var(--border);border-radius:99px;color:var(--muted);padding:.35rem .85rem;font-size:.78rem;white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0}
.mt.active{background:var(--primary);border-color:var(--primary);color:#fff}
.eg{display:flex;flex-direction:column;gap:.55rem}
.ecard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.8rem .9rem;display:flex;align-items:center;gap:.8rem}
.eico{font-size:1.4rem}.ecn{font-weight:500;font-size:.92rem;margin-bottom:.25rem}
.ecm{display:flex;gap:.35rem;flex-wrap:wrap}
.tag{font-size:.68rem;padding:.12rem .45rem;border-radius:99px;font-weight:500}
.tm{background:rgba(99,102,241,.2);color:#a5b4fc}.te{background:rgba(255,255,255,.08);color:var(--muted)}
/* Routines */
.fg{margin-bottom:.9rem}.fl{display:block;font-size:.82rem;color:var(--muted);margin-bottom:.3rem}
.fi{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);padding:.55rem .85rem;font-size:.92rem}
.fi:focus{outline:none;border-color:var(--primary)}
select.fi{cursor:pointer}
.rer{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:.7rem;margin-bottom:.45rem}
.ren{font-weight:500;margin-bottom:.45rem}
.rei{display:flex;gap:.7rem;flex-wrap:wrap}.rei label{display:flex;flex-direction:column;gap:.18rem;font-size:.72rem;color:var(--muted)}
.rei input{width:65px}
.reb{display:flex;gap:.45rem;margin-top:.45rem}
.reb button{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:.22rem .45rem;cursor:pointer;font-size:.82rem}
.reb button:hover{color:var(--text);border-color:var(--primary)}
.fa{display:flex;gap:.7rem;margin-top:1.4rem;flex-wrap:wrap}
.ems{color:var(--muted);font-size:.88rem;padding:.45rem 0;text-align:center}
.ra{display:flex;gap:.45rem;margin-top:.7rem}
/* Detail */
.dm{display:flex;gap:.9rem;flex-wrap:wrap;font-size:.82rem;color:var(--muted);margin-bottom:1.2rem}
.dexs{display:flex;flex-direction:column;gap:.7rem}
.dex{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.9rem}
.dexn{font-weight:600;margin-bottom:.22rem}.dexs2{font-size:.78rem;color:var(--muted);margin-bottom:.45rem}
.dsets{display:flex;flex-wrap:wrap;gap:.35rem}
.dset{background:var(--elevated);border-radius:6px;padding:.22rem .55rem;font-size:.78rem}
.dnotes{margin-top:.9rem;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:.7rem;font-size:.88rem}
/* Progress */
.cs{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;margin-bottom:.9rem}
.ct{font-weight:600;margin-bottom:.7rem;font-size:.92rem}
.cw{width:100%;overflow:hidden}.cw canvas{width:100% !important}
.ch{font-size:.82rem;color:var(--muted)}
/* Empty */
.es{text-align:center;padding:2.5rem 1rem;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:.9rem}
.ei{font-size:2.8rem}
/* Misc */
.cnt{font-size:.82rem;color:var(--muted)}
@media(max-width:380px){.sv{font-size:1.45rem}.pt{font-size:1.25rem}}
</style>
</head>
<body>
<div id="app"></div>
<nav>
  <button class="ni" data-r="dashboard" onclick="nav('dashboard')"><span class="ni-icon">🏠</span><span>Inicio</span></button>
  <button class="ni" data-r="workouts" onclick="nav('workouts')"><span class="ni-icon">🏋️</span><span>Entrenos</span><div id="badge"></div></button>
  <button class="ni" data-r="exercises" onclick="nav('exercises')"><span class="ni-icon">💪</span><span>Ejercicios</span></button>
  <button class="ni" data-r="routines" onclick="nav('routines')"><span class="ni-icon">📋</span><span>Rutinas</span></button>
  <button class="ni" data-r="progress" onclick="nav('progress')"><span class="ni-icon">📈</span><span>Progreso</span></button>
</nav>

<script>
// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
const EXERCISES = [
  {id:'e1',name:'Press Banca',mg:'Pecho',eq:'Barra'},{id:'e2',name:'Press Banca Inclinado',mg:'Pecho',eq:'Barra'},
  {id:'e3',name:'Press Mancuernas',mg:'Pecho',eq:'Mancuernas'},{id:'e4',name:'Aperturas Mancuernas',mg:'Pecho',eq:'Mancuernas'},
  {id:'e5',name:'Fondos en Paralelas',mg:'Pecho',eq:'Peso Corporal'},{id:'e6',name:'Crossover Polea',mg:'Pecho',eq:'Polea'},
  {id:'e7',name:'Peso Muerto',mg:'Espalda',eq:'Barra'},{id:'e8',name:'Dominadas',mg:'Espalda',eq:'Peso Corporal'},
  {id:'e9',name:'Remo con Barra',mg:'Espalda',eq:'Barra'},{id:'e10',name:'Remo en Polea',mg:'Espalda',eq:'Polea'},
  {id:'e11',name:'Jalón al Pecho',mg:'Espalda',eq:'Polea'},{id:'e12',name:'Remo Mancuerna',mg:'Espalda',eq:'Mancuernas'},
  {id:'e13',name:'Press Militar',mg:'Hombros',eq:'Barra'},{id:'e14',name:'Press Arnold',mg:'Hombros',eq:'Mancuernas'},
  {id:'e15',name:'Elevaciones Laterales',mg:'Hombros',eq:'Mancuernas'},{id:'e16',name:'Elevaciones Frontales',mg:'Hombros',eq:'Mancuernas'},
  {id:'e17',name:'Pájaro / Rear Delt Fly',mg:'Hombros',eq:'Mancuernas'},
  {id:'e18',name:'Curl con Barra',mg:'Bíceps',eq:'Barra'},{id:'e19',name:'Curl Mancuernas',mg:'Bíceps',eq:'Mancuernas'},
  {id:'e20',name:'Curl Martillo',mg:'Bíceps',eq:'Mancuernas'},{id:'e21',name:'Curl en Polea',mg:'Bíceps',eq:'Polea'},
  {id:'e22',name:'Press Francés',mg:'Tríceps',eq:'Barra'},{id:'e23',name:'Extensión Tríceps Polea',mg:'Tríceps',eq:'Polea'},
  {id:'e24',name:'Fondos en Banco',mg:'Tríceps',eq:'Peso Corporal'},{id:'e25',name:'Patada de Tríceps',mg:'Tríceps',eq:'Mancuernas'},
  {id:'e26',name:'Sentadilla',mg:'Piernas',eq:'Barra'},{id:'e27',name:'Prensa de Piernas',mg:'Piernas',eq:'Máquina'},
  {id:'e28',name:'Zancadas',mg:'Piernas',eq:'Mancuernas'},{id:'e29',name:'Curl Femoral',mg:'Piernas',eq:'Máquina'},
  {id:'e30',name:'Extensión de Cuádriceps',mg:'Piernas',eq:'Máquina'},{id:'e31',name:'Elevación de Talones',mg:'Piernas',eq:'Máquina'},
  {id:'e32',name:'Sentadilla Búlgara',mg:'Piernas',eq:'Mancuernas'},
  {id:'e33',name:'Hip Thrust',mg:'Glúteos',eq:'Barra'},{id:'e34',name:'Peso Muerto Rumano',mg:'Glúteos',eq:'Barra'},
  {id:'e35',name:'Abducción de Cadera',mg:'Glúteos',eq:'Máquina'},
  {id:'e36',name:'Plancha',mg:'Core',eq:'Peso Corporal'},{id:'e37',name:'Crunch',mg:'Core',eq:'Peso Corporal'},
  {id:'e38',name:'Rueda Abdominal',mg:'Core',eq:'Accesorio'},{id:'e39',name:'Elevación de Piernas',mg:'Core',eq:'Peso Corporal'},
  {id:'e40',name:'Russian Twist',mg:'Core',eq:'Peso Corporal'},
  {id:'e41',name:'Correr',mg:'Cardio',eq:'Ninguno'},{id:'e42',name:'Bicicleta',mg:'Cardio',eq:'Máquina'},
  {id:'e43',name:'Elíptica',mg:'Cardio',eq:'Máquina'},{id:'e44',name:'Remo Ergómetro',mg:'Cardio',eq:'Máquina'},
  {id:'e45',name:'Saltar Cuerda',mg:'Cardio',eq:'Accesorio'}
];
const MUSCLE_GROUPS = ['Pecho','Espalda','Hombros','Bíceps','Tríceps','Piernas','Glúteos','Core','Cardio'];
const EMOJIS = {Pecho:'💪',Espalda:'🔙',Hombros:'🏋️',Bíceps:'💪',Tríceps:'💪',Piernas:'🦵',Glúteos:'🍑',Core:'🔥',Cardio:'❤️'};

// ═══════════════════════════════════════════════════
// STORE
// ═══════════════════════════════════════════════════
function load(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch{return[]}}
function save(k,d){localStorage.setItem(k,JSON.stringify(d))}
const DB = {
  workouts(){return load('gw')},
  saveWo(w){const a=load('gw');const i=a.findIndex(x=>x.id===w.id);if(i>=0)a[i]=w;else a.unshift(w);save('gw',a)},
  delWo(id){save('gw',load('gw').filter(w=>w.id!==id))},
  getWo(id){return load('gw').find(w=>w.id===id)||null},
  routines(){return load('gr')},
  saveRo(r){const a=load('gr');const i=a.findIndex(x=>x.id===r.id);if(i>=0)a[i]=r;else a.unshift(r);save('gr',a)},
  delRo(id){save('gr',load('gr').filter(r=>r.id!==id))},
  getRo(id){return load('gr').find(r=>r.id===id)||null},
  active(){try{return JSON.parse(localStorage.getItem('ga'))||null}catch{return null}},
  saveActive(w){localStorage.setItem('ga',JSON.stringify(w))},
  clearActive(){localStorage.removeItem('ga')},
  customExs(){return load('gcx')},
  saveCustomEx(e){const a=load('gcx');const i=a.findIndex(x=>x.id===e.id);if(i>=0)a[i]=e;else a.push(e);save('gcx',a)},
  delCustomEx(id){save('gcx',load('gcx').filter(e=>e.id!==id))}
};

// ═══════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(d){return new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'})}
function fmtTime(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return h>0?`${h}h ${m%60}m`:`${m}m ${s%60}s`}
function vol(w){return w.exercises.reduce((t,e)=>t+e.sets.reduce((s,x)=>s+(x.done&&x.weight&&x.reps?x.weight*x.reps:0),0),0)}
function exName(id){const e=EXERCISES.find(x=>x.id===id);return e?e.name:id}
function exGet(id){return allExercises().find(x=>x.id===id)||{name:id,mg:'',eq:''}}

// ═══════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════
const app=document.getElementById('app');
let currentTimer=null;

function nav(page,params){
  if(currentTimer){clearInterval(currentTimer);currentTimer=null}
  document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.r===page||
    (el.dataset.r!=='dashboard'&&page.startsWith(el.dataset.r))));
  const pages={dashboard:renderDashboard,workouts:renderWorkouts,exercises:renderExercises,
    routines:renderRoutines,progress:renderProgress,workout:renderWorkoutEditor,
    workoutDetail:renderWorkoutDetail,routineEditor:renderRoutineEditor};
  if(pages[page])pages[page](params);
}
window.nav=nav;

// Badge update
setInterval(()=>{const b=document.getElementById('badge');if(b)b.style.display=DB.active()?'block':'none'},1500);

// ═══════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════
function renderDashboard(){
  const ws=DB.workouts(),ac=DB.active(),rec=ws.slice(0,3);
  const totalV=ws.reduce((s,w)=>s+vol(w),0);
  const thisW=ws.filter(w=>{const d=new Date(w.date),n=new Date();return d>=(new Date(n-7*864e5))}).length;
  let streak=0;
  const sorted=[...ws].sort((a,b)=>new Date(b.date)-new Date(a.date));
  let chk=new Date();chk.setHours(0,0,0,0);
  for(const w of sorted){const d=new Date(w.date);d.setHours(0,0,0,0);if(d.getTime()===chk.getTime()||d.getTime()===chk.getTime()-864e5){streak++;chk=d}else break}
  const h=new Date().getHours();
  const greet=h<12?'¡Buenos días! ☀️':h<18?'¡Buenas tardes! 💪':'¡Buenas noches! 🌙';
  app.innerHTML=`<div class="pg">

function exBlock(ex,i){
  const e=exGet(ex.eid);
  return `<div class="eb">
  <div class="ebh"><span class="ebn">${esc(e.name)}</span><span class="ebm">${e.mg}</span><button class="brex" onclick="remEx(${i})">✕</button></div>

  <div id="sets${i}">${setsHtml(ex.sets,i)}</div>
  <button class="bas" onclick="addSet(${i})">+ Serie</button>
  </div>`;
}
function setsHtml(sets,ei){
  return sets.map((s,si)=>`<div class="sr${s.done?' done':''}" id="sr${ei}-${si}">
    <span class="sn">${si+1}</span>
    <input type="number" class="si2" value="${s.weight||''}" placeholder="0" oninput="updSet(${ei},${si},'weight',this.value)" min="0" step="0.5">
    <input type="number" class="si2" value="${s.reps||''}" placeholder="0" oninput="updSet(${ei},${si},'reps',this.value)" min="0">
    <input type="checkbox" ${s.done?'checked':''} onchange="updSet(${ei},${si},'done',this.checked)">
    <button class="brs" onclick="remSet(${ei},${si})">✕</button>
  </div>`).join('');
}

window.updWName=v=>{const w=DB.active();if(w){w.name=v;DB.saveActive(w)}};
window.updWNotes=v=>{const w=DB.active();if(w){w.notes=v;DB.saveActive(w)}};
window.finishW=()=>{clearInterval(currentTimer);const w=DB.active();w.duration=Date.now()-w.start;DB.saveWo(w);DB.clearActive();nav('workoutDetail',w.id)};
window.discardW=()=>{if(confirm('¿Descartar el entrenamiento?')){clearInterval(currentTimer);DB.clearActive();nav('workouts')}};
window.addSet=i=>{const w=DB.active();const ls=w.exercises[i].sets.slice(-1)[0];w.exercises[i].sets.push({id:uid(),weight:ls?ls.weight:'',reps:ls?ls.reps:'',done:false});DB.saveActive(w);document.getElementById('sets'+i).innerHTML=setsHtml(w.exercises[i].sets,i)};
window.remSet=(ei,si)=>{const w=DB.active();w.exercises[ei].sets.splice(si,1);DB.saveActive(w);document.getElementById('sets'+ei).innerHTML=setsHtml(w.exercises[ei].sets,ei)};
window.updSet=(ei,si,f,v)=>{const w=DB.active();w.exercises[ei].sets[si][f]=f==='done'?v:(parseFloat(v)||v);DB.saveActive(w);const row=document.getElementById(`sr${ei}-${si}`);if(row)row.className='sr'+(w.exercises[ei].sets[si].done?' done':'')};
window.remEx=i=>{const w=DB.active();w.exercises.splice(i,1);DB.saveActive(w);document.getElementById('exlist').innerHTML=w.exercises.map((e,j)=>exBlock(e,j)).join('')};
window.showPicker=()=>{document.getElementById('picker').classList.remove('h');document.getElementById('psearch').focus()};
window.hidePicker=()=>document.getElementById('picker').classList.add('h');
window.filterEx=q=>{document.getElementById('plist').innerHTML=buildPicker(q)};
window.pickEx=eid=>{const w=DB.active();w.exercises.push({id:uid(),eid,sets:[{id:uid(),weight:'',reps:'',done:false}],notes:''});DB.saveActive(w);hidePicker();document.getElementById('exlist').innerHTML=w.exercises.map((e,j)=>exBlock(e,j)).join('')};

function buildPicker(q){
  const ql=q.toLowerCase();
  const grps={};
  allExercises().filter(e=>!ql||e.name.toLowerCase().includes(ql)||e.mg.toLowerCase().includes(ql))
    .forEach(e=>{(grps[e.mg]=grps[e.mg]||[]).push(e)});
  return Object.entries(grps).map(([g,es])=>`<div class="pg2"><div class="pgl">${g}</div>${es.map(e=>`<div class="pe" onclick="pickEx('${e.id}')">${esc(e.name)}<span class="peq">${e.custom?'⭐ ':''} ${e.eq}</span></div>`).join('')}</div>`).join('')||'<div class="pem">Sin resultados</div>';
}

function buildRPicker(q){
  const ql=q.toLowerCase();

  allExercises().filter(e=>!ql||e.name.toLowerCase().includes(ql)||e.mg.toLowerCase().includes(ql))

}

// ═══════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════
function renderProgress(){
  const ws=DB.workouts();
  if(ws.length===0){
    app.innerHTML=`<div class="pg"><div class="ph"><h1 class="pt">Progreso</h1></div>
    <div class="es"><div class="ei">📈</div><p>Registra entrenamientos para ver tu progreso.</p></div></div>`;
    return;
  }
  const sorted=[...ws].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-12);
  const volData=sorted.map(w=>({label:fmtDate(w.date).slice(0,6),value:vol(w)}));
  const freqData=weekFreq(ws,8);
  const usedEids=new Set();ws.forEach(w=>w.exercises.forEach(e=>usedEids.add(e.eid)));
  const usedEx=EXERCISES.filter(e=>usedEids.has(e.id));
  let selEx='';
  function draw(){
    const sd=selEx?strengthCurve(ws,selEx):[];
    app.innerHTML=`<div class="pg">
    <div class="ph"><h1 class="pt">Progreso</h1></div>
    ${summaryStats(ws)}
    <div class="cs"><div class="ct">Volumen por sesión (últimas ${sorted.length})</div><div class="cw"><canvas id="vc" height="200"></canvas></div></div>
    <div class="cs"><div class="ct">Frecuencia semanal (8 semanas)</div><div class="cw"><canvas id="fc" height="180"></canvas></div></div>
    <div class="cs">
      <div class="ct">Curva de fuerza</div>
      <select class="fi" onchange="selStrEx(this.value)" style="margin-bottom:.75rem">
        <option value="">-- Selecciona un ejercicio --</option>
        ${usedEx.map(e=>`<option value="${e.id}"${e.id===selEx?' selected':''}>${esc(e.name)}</option>`).join('')}
      </select>
      ${sd.length>1?`<div class="cw"><canvas id="sc" height="200"></canvas></div>`:
        selEx?'<p class="ch">Necesitas al menos 2 sesiones con este ejercicio.</p>':''}
    </div>
    </div>`;
    window.selStrEx=id=>{selEx=id;draw()};
    setTimeout(()=>{
      drawBar('vc',volData,'#6366f1');
      drawBar('fc',freqData,'#22c55e');
      if(sd.length>1)drawLine('sc',sd,'#f59e0b');
    },0);
  }
  draw();
}
function summaryStats(ws){
  const tot=ws.length,tv=ws.reduce((s,w)=>s+vol(w),0);
  const last=[...ws].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  return `<div class="sg">
    <div class="sc"><div class="si">🏋️</div><div class="sv">${tot}</div><div class="sl">Total sesiones</div></div>
    <div class="sc"><div class="si">⚡</div><div class="sv">${(tv/1000).toFixed(1)}k</div><div class="sl">Vol. total (kg)</div></div>
    <div class="sc"><div class="si">📊</div><div class="sv">${tot?Math.round(tv/tot):0}</div><div class="sl">Vol. promedio</div></div>
    <div class="sc"><div class="si">📅</div><div class="sv" style="font-size:.95rem">${last?fmtDate(last.date):'—'}</div><div class="sl">Último entreno</div></div>
  </div>`;
}
function weekFreq(ws,n){
  const res=[];const now=new Date();now.setHours(0,0,0,0);
  for(let i=n-1;i>=0;i--){
    const ws2=new Date(now-i*7*864e5),we=new Date(ws2.getTime()+7*864e5);
    res.push({label:`S-${i}`,value:ws.filter(w=>{const d=new Date(w.date);return d>=ws2&&d<we}).length});
  }
  return res;
}
function strengthCurve(ws,eid){
  const pts=[];
  [...ws].sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(w=>{
    const ex=w.exercises.find(e=>e.eid===eid);
    if(ex){const mx=Math.max(0,...ex.sets.filter(s=>s.done&&s.weight).map(s=>s.weight));if(mx>0)pts.push({label:fmtDate(w.date).slice(0,6),value:mx})}
  });
  return pts;
}

// ─── Canvas charts ────────────────────────────────
function drawBar(id,data,color){
  const c=document.getElementById(id);if(!c||!data.length)return;
  const ctx=c.getContext('2d');const W=c.offsetWidth||580;c.width=W;const H=c.height;
  const p={t:20,r:16,b:38,l:46};const mx=Math.max(...data.map(d=>d.value),1);
  const bw=(W-p.l-p.r)/data.length*.72,gap=(W-p.l-p.r)/data.length;
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){
    const y=p.t+(H-p.t-p.b)*(i/4);
    ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='11px system-ui';ctx.textAlign='right';
    ctx.fillText(Math.round(mx*(1-i/4)),p.l-5,y+4);
  }
  data.forEach((d,i)=>{
    const x=p.l+i*gap+(gap-bw)/2,bh=((H-p.t-p.b)*d.value)/mx,y=H-p.b-bh;
    ctx.fillStyle=color;ctx.globalAlpha=.85;
    rRect(ctx,x,y,bw,bh,4);ctx.fill();ctx.globalAlpha=1;
    if(d.value>0){ctx.fillStyle='#fff';ctx.font='bold 10px system-ui';ctx.textAlign='center';ctx.fillText(d.value,x+bw/2,y-4)}
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='10px system-ui';ctx.textAlign='center';ctx.fillText(d.label,x+bw/2,H-p.b+14);
  });
}
function drawLine(id,data,color){
  const c=document.getElementById(id);if(!c||!data.length)return;
  const ctx=c.getContext('2d');const W=c.offsetWidth||580;c.width=W;const H=c.height;
  const p={t:20,r:16,b:38,l:46};
  const mx=Math.max(...data.map(d=>d.value)),mn=Math.min(...data.map(d=>d.value));
  const xS=(W-p.l-p.r)/(data.length-1||1);
  const yS=v=>p.t+(H-p.t-p.b)*(1-(v-mn)/(mx-mn+1));
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<=4;i++){
    const y=p.t+(H-p.t-p.b)*(i/4);
    ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.font='11px system-ui';ctx.textAlign='right';
    ctx.fillText(Math.round(mx-(mx-mn)*(i/4)),p.l-5,y+4);
  }
  ctx.beginPath();data.forEach((d,i)=>{const x=p.l+i*xS,y=yS(d.value);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.lineTo(p.l+(data.length-1)*xS,H-p.b);ctx.lineTo(p.l,H-p.b);ctx.closePath();
  ctx.fillStyle=color+'33';ctx.fill();
  ctx.beginPath();data.forEach((d,i)=>{const x=p.l+i*xS,y=yS(d.value);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.stroke();
  data.forEach((d,i)=>{
    const x=p.l+i*xS,y=yS(d.value);
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 10px system-ui';ctx.textAlign='center';ctx.fillText(d.value+'kg',x,y-10);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='10px system-ui';ctx.fillText(d.label,x,H-p.b+14);
  });
}
function rRect(ctx,x,y,w,h,r){
  if(h<r*2)r=h/2;ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h);ctx.lineTo(x,y+h);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
